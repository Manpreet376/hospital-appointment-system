{% extends "base.html" %}
{% block title %}MediCare — Register{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box" style="max-width:500px;">
    <div class="card">
      <div class="auth-icon">📋</div>
      <h2 class="auth-title">Create your account</h2>
      <p class="auth-sub">Join MediCare — it's free</p>

      <form method="POST" action="{{ url_for('register') }}">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First name</label>
            <input type="text" name="first_name" class="form-control" placeholder="Rahul" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Last name</label>
            <input type="text" name="last_name" class="form-control" placeholder="Singh" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" placeholder="you@email.com" required/>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone number</label>
            <input type="text" name="phone" class="form-control" placeholder="+91 98765 43210"/>
          </div>
          <div class="form-group">
            <label class="form-label">Date of birth</label>
            <input type="date" name="dob" class="form-control"/>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-control">
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Blood group</label>
            <select name="blood_group" class="form-control">
              <option value="">Select</option>
              <option>A+</option><option>A−</option>
              <option>B+</option><option>B−</option>
              <option>AB+</option><option>AB−</option>
              <option>O+</option><option>O−</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" name="address" class="form-control" placeholder="Your full address"/>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required/>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Create account →</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
